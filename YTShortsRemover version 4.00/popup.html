<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YT Shorts Remover</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text: #e8e8e8;
            --text-muted: #888;
            --accent: #ff0000;
            --accent-hover: #cc0000;
            --switch-bg: #333;
            --switch-on: #ff0000;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            width: 280px;
            min-height: 260px;
        }

        .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .title-main {
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .switch-label {
            font-size: 13px;
            color: var(--text);
            flex: 1;
            line-height: 1.35;
        }

        .switch-wrap {
            flex-shrink: 0;
        }

        .switch-wrap input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            display: block;
            width: 40px;
            height: 22px;
            background: var(--switch-bg);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .switch-slider::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 2px;
            top: 2px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }

        .switch-wrap input:checked + .switch-slider {
            background: var(--switch-on);
        }

        .switch-wrap input:checked + .switch-slider::after {
            transform: translateX(18px);
        }

        .footer {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .github-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            font-size: 12px;
            font-family: inherit;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }

        .github-btn:hover {
            color: var(--text);
            border-color: #444;
            background: #222;
        }

        .github-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="icon.png" height ="32" width ="32"><p class="title-main">YT Shorts Remover</p>
            <p class="title">Made by Ollie Y</p>
        </header>

        <div class="switch-row">
            <span class="switch-label">Remove shorts from pages</span>
            <label class="switch-wrap">
                <input type="checkbox" id="removeShortsFromPages" aria-label="Remove shorts from pages">
                <span class="switch-slider"></span>
            </label>
        </div>
        <div class="switch-row">
            <span class="switch-label">Disable scrolling on shorts</span>
            <label class="switch-wrap">
                <input type="checkbox" id="stopScrolling" aria-label="Disable scrolling on shorts">
                <span class="switch-slider"></span>
            </label>
        </div>
        <div class="switch-row">
            <span class="switch-label">Redirect to YouTube home page when you go to a short</span>
            <label class="switch-wrap">
                <input type="checkbox" id="redirectShortsToYoutube" aria-label="Redirect to YouTube home when on a short">
                <span class="switch-slider"></span>
            </label>
        </div>

        <footer class="footer">
            <a id="githubLink" href="https://github.com/OllieOlzu/Youtube-Shorts-Remover" target="_blank" rel="noopener noreferrer" class="github-btn">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                View on GitHub
            </a>
            <p class="title">Version 4.0</p>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
