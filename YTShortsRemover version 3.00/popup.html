<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Extension Menu</title>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        label { display: flex; align-items: center; margin-bottom: 10px; }
        input[type="checkbox"] { margin-right: 10px; }
    </style>
</head>
<body>
    <label>
        <input type="checkbox" id="stopScrolling">
        Stop Scrolling
    </label>
    <label>
        <input type="checkbox" id="removeShortsFromPages">
        Remove shorts from pages
    </label>
    <label>
        <input type="checkbox" id="redirectShortsToYoutube">
        Redirect back to youtube when on a youtube short
    </label>

    <script src="popup.js"></script>
</body>
</html>
